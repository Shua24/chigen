name: Build and Release EXE

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: windows-latest

    env:
      Solution_Name: Chigen.sln
      Test_Project_Path: src\Chigen.Tests\Chigen.Tests.csproj
      App_Project_Path: src\Chigen.App\Chigen.App.csproj

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore
      run: dotnet restore $env:Solution_Name

    - name: Build
      run: dotnet build $env:Solution_Name --configuration Release --no-restore

    - name: Test
      run: dotnet test $env:Test_Project_Path --configuration Release --no-build --verbosity normal

    - name: Publish (win-x64 self-contained)
      run: dotnet publish $env:App_Project_Path --configuration Release --runtime win-x64 --self-contained true -p:PublishReadyToRun=true --output publish/Chigen

    - name: Install Inno Setup
      run: choco install innosetup -y --no-progress

    - name: Compile installer
      run: iscc installer\setup.iss /DMyAppVersion=1.0.${{ github.run_number }}

    - name: Upload installer artifact
      uses: actions/upload-artifact@v4
      with:
        name: Chigen-Setup
        path: installer-output\*.exe

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: Chigen-Setup
          path: Chigen-Setup

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Chigen v${{ github.run_number }}
          body: |
            Automated release build for commit ${{ github.sha }}
          files: Chigen-Setup/*
          draft: false
          prerelease: false
