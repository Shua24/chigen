name: Build and Release EXE

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: windows-latest

    env:
      Solution_Name: Chigen.sln
      Test_Project_Path: src\Chigen.Tests\Chigen.Tests.csproj
      App_Project_Path: src\Chigen.App\Chigen.App.csproj

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore
      run: dotnet restore $env:Solution_Name

    - name: Build
      run: dotnet build $env:Solution_Name --configuration Release --no-restore

    - name: Test
      run: dotnet test $env:Test_Project_Path --configuration Release --no-build --verbosity normal

    - name: Publish (win-x64 self-contained)
      run: dotnet publish $env:App_Project_Path --configuration Release --runtime win-x64 --self-contained true -p:PublishReadyToRun=true --output publish/Chigen

    - name: Create portable ZIP
      shell: powershell
      run: Compress-Archive -Path publish/Chigen\* -DestinationPath Chigen-Portable-${{ github.run_number }}.zip -Force

    - name: Install Inno Setup
      run: choco install innosetup -y --no-progress

    - name: Compile installer
      shell: cmd
      run: >-
        "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\setup.iss /DMyAppVersion=1.0.${{ github.run_number }}

    - name: Sign with SignPath Foundation
      id: sign
      if: ${{ secrets.SIGNPATH_API_TOKEN != '' }}
      uses: signpath/submit-signing-request@v1
      with:
        api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
        organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
        project-slug: chigen
        signing-policy-slug: ${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}
        input-artifact-path: installer-output/Chigen-Setup-1.0.${{ github.run_number }}.exe
        output-artifact-path: installer-output/Chigen-Setup-1.0.${{ github.run_number }}-signed.exe
        wait-for-signing: true

    - name: Replace with signed installer
      if: steps.sign.outcome == 'success'
      shell: powershell
      run: |
        Move-Item -Force installer-output\Chigen-Setup-1.0.${{ github.run_number }}-signed.exe `
                         installer-output\Chigen-Setup-1.0.${{ github.run_number }}.exe

    - name: Upload installer
      uses: actions/upload-artifact@v4
      with:
        name: Chigen-Installer
        path: installer-output/*.exe

    - name: Upload portable ZIP
      uses: actions/upload-artifact@v4
      with:
        name: Chigen-Portable
        path: Chigen-Portable-*.zip

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: Chigen-Release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Chigen v${{ github.run_number }}
          body: |
            ## Chigen v${{ github.run_number }}

            Automated release build for commit ${{ github.sha }}

            ### Downloads
            - `Chigen-Setup-*.exe` -- Inno Setup installer (requires admin)
            - `Chigen-Portable-*.zip` -- Portable version (extract and run, no admin needed)
          files: |
            Chigen-Release/Chigen-Installer/*.exe
            Chigen-Release/Chigen-Portable/*.zip
          draft: false
          prerelease: false
