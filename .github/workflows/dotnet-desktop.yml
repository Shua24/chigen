name: Build and Release EXE

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: windows-latest

    env:
      Solution_Name: Chigen.sln
      Test_Project_Path: src\Chigen.Tests\Chigen.Tests.csproj
      App_Project_Path: src\Chigen.App\Chigen.App.csproj

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore
      run: dotnet restore $env:Solution_Name

    - name: Build
      run: dotnet build $env:Solution_Name --configuration Release --no-restore

    - name: Test
      run: dotnet test $env:Test_Project_Path --configuration Release --no-build --verbosity normal

    - name: Publish (win-x64 self-contained)
      run: dotnet publish $env:App_Project_Path --configuration Release --runtime win-x64 --self-contained true -p:PublishReadyToRun=true --output publish/Chigen

    - name: Create portable ZIP
      shell: powershell
      run: Compress-Archive -Path publish/Chigen\* -DestinationPath Chigen-Portable-${{ github.run_number }}.zip -Force

    - name: Install Inno Setup
      run: choco install innosetup -y --no-progress

    - name: Compile installer
      shell: cmd
      run: >-
        "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\setup.iss /DMyAppVersion=1.0.${{ github.run_number }}

    - name: Sign installer (optional)
      shell: powershell
      run: |
        $cert = "${{ secrets.SIGNING_CERT }}"
        $pass = "${{ secrets.SIGNING_PASSWORD }}"
        if ($cert -and $pass) {
          $pfxPath = Join-Path $env:TEMP "signing.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($cert))
          $exe = Get-ChildItem installer-output\*.exe | Select-Object -First 1
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" | Select-Object -First 1 -ExpandProperty FullName
          if ($exe -and $signtool) {
            & $signtool sign /fd SHA256 /f $pfxPath /p $pass /t http://timestamp.digicert.com $exe.FullName
          }
        }
        else { echo "No signing certificate configured; installer will be unsigned." }
      continue-on-error: true

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Chigen-Setup
        path: |
          installer-output\*.exe
          Chigen-Portable-*.zip

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: Chigen-Setup
          path: Chigen-Setup

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Chigen v${{ github.run_number }}
          body: |
            ## Chigen v${{ github.run_number }}

            Automated release build for commit ${{ github.sha }}

            ### !! SmartScreen / Windows Defender Notice

            The installer is unsigned. Windows may show **"Windows protected your PC"** when you try to run it.
            To bypass:
            1. Click **More info** (blue link) on the SmartScreen dialog
            2. Click **Run anyway**
            3. If you still get an error after installation, **right-click the downloaded .exe -> Properties -> check "Unblock" -> OK**, then run it again

            If the installer fails with **"Windows could not find the file specified"**, Windows Defender may have quarantined extracted files during installation. Try:
            - **Temporarily disable** Windows Defender Real-time Protection before installing, then re-enable after
            - Or use the **Portable ZIP** version (just extract and run `Chigen.exe` -- no installation needed)

            ### Downloads
            - `Chigen-Setup-*.exe` -- Inno Setup installer (requires admin)
            - `Chigen-Portable-*.zip` -- Portable version (extract and run, no admin needed)
          files: |
            Chigen-Setup/*.exe
            Chigen-Setup/*.zip
          draft: false
          prerelease: false
